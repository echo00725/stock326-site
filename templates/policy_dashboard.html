<!doctype html>
<html lang="zh-CN"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国财政政策与货币政策全景</title>
  <link rel="stylesheet" href="/static/style.css?v=20260330b" />
  <link rel="stylesheet" href="/static/dark.css?v=20260330b" />
  <style>
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}
    .tab{padding:8px 12px;border:1px solid #334155;border-radius:10px;cursor:pointer;background:#0f172a;color:#e2e8f0}
    .tab.active{background:#1d4ed8;border-color:#1d4ed8}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .item{border:1px solid #334155;border-radius:14px;padding:14px;background:#0b1220}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .title{margin:0;font-size:17px}
    .muted{color:#94a3b8}
    .kpis{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
    .kpi{background:#111827;border:1px solid #334155;border-radius:999px;padding:4px 10px;font-size:12px;color:#cbd5e1}
    .news{display:grid;gap:8px}
    .news a{color:#93c5fd;text-decoration:none}
    .news a:hover{text-decoration:underline}
    .line-list{margin-top:8px;display:grid;gap:4px}
    .line{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;padding:4px 0;border-bottom:1px dashed #243244;font-size:13px;line-height:1.35}
    .line:last-child{border-bottom:none}
    .line .m{color:#93c5fd;min-width:120px}
    .line .v{color:#e2e8f0}
    .line .f{color:#94a3b8}
    .src a{color:#93c5fd;text-decoration:none}
    .src a:hover{text-decoration:underline}
  </style>
</head>
<body>
<main class="container">
  <div style="margin-bottom:10px"><a class="btn secondary" href="/">← 返回功能目录</a></div>
  <h1>🏛️ 中国财政政策 & 货币政策全景</h1>
  <p class="sub">覆盖主要政策工具、传导逻辑与观察指标，并提供政策新闻窗口。</p>

  <section class="card">
    <div class="tabs">
      <button class="tab active" data-key="fiscal" onclick="switchTab('fiscal', this)">财政政策工具</button>
      <button class="tab" data-key="monetary" onclick="switchTab('monetary', this)">货币政策工具</button>
      <button class="tab" data-key="combo" onclick="switchTab('combo', this)">政策组合框架</button>
    </div>
    <div id="policyGrid" class="grid"></div>
  </section>

  <section class="card">
    <h2>📰 政策新闻窗口（官方口径聚合）</h2>
    <p class="muted" id="newsTs"></p>
    <div id="newsList" class="news"></div>
  </section>
</main>
<script>
let catalog = null;

function defaultRowsFromSignals(signals, key){
  const src = key==='monetary' ? '人民银行' : (key==='fiscal' ? '财政部' : '国务院/多部门');
  const freq = key==='combo' ? '不定期' : '月/季';
  return (signals||[]).map(s => ({ metric: s, latest: '最新值请见右侧政策新闻与官方公告', freq, source: src }));
}

function summaryChips(tableRows){
  const pick = (keys) => {
    const row = tableRows.find(x => keys.some(k => (x.metric||'').includes(k)) && (x.latest||'') && (x.latest||'')!=='暂无' && (x.latest||'')!=='抓取失败');
    return row ? row.latest : '';
  };
  const date = pick(['实施日期','公告日期','日期']);
  const rate = pick(['利率','LPR']);
  const amt  = pick(['操作量','规模','额度','金额','亿元']);
  const arr = [];
  if(date) arr.push(`时间：${date}`);
  if(rate) arr.push(`利率：${rate}`);
  if(amt) arr.push(`规模：${amt}`);
  return arr;
}

function sourceCell(src){
  if(!src) return '-';
  if(/^https?:\/\//.test(src)) return `<span class="src"><a href="${src}" target="_blank" rel="noopener">查看来源</a></span>`;
  return src;
}

function renderList(key){
  const rows = (catalog && catalog[key]) || [];
  const box = document.getElementById('policyGrid');
  if(!rows.length){ box.innerHTML = '<p class="muted">暂无数据</p>'; return; }
  box.innerHTML = rows.map((r) => {
    const tableRows = (r.table && r.table.length) ? r.table : defaultRowsFromSignals(r.signals, key);
    const chips = summaryChips(tableRows);
    return `
      <div class="item">
        <div class="head">
          <h3 class="title">${r.name || ''}</h3>
          <div class="kpis">${chips.map(c=>`<span class="kpi">${c}</span>`).join('')}</div>
        </div>
        <div class="line-list">
          ${tableRows.map(x=>`<div class="line"><span class="m">${x.metric||'-'}：</span><span class="v">${x.latest||'-'}</span><span class="f">[${x.freq||'-'}]</span><span class="src">${sourceCell(x.source||'')}</span></div>`).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function switchTab(key, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderList(key);
}

async function loadCatalog(){
  const res = await fetch('/api/policy/catalog');
  catalog = await res.json();
  renderList('fiscal');
}

async function loadNews(){
  const res = await fetch('/api/policy/news');
  const data = await res.json();
  document.getElementById('newsTs').textContent = `更新时间：${data.updated_at || '-'}`;
  const items = data.items || [];
  document.getElementById('newsList').innerHTML = items.length
    ? items.map(x=>`<div>• <a href="${x.url}" target="_blank" rel="noopener">${x.title}</a> <span class="muted">[${x.source||''}]</span></div>`).join('')
    : '<p class="muted">暂无可用政策新闻</p>';
}

loadCatalog();
loadNews();
</script>
</body></html>
