<!doctype html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>超跌反弹扫描</title>
<link rel="stylesheet" href="/static/style.css?v=20260330b"/><link rel="stylesheet" href="/static/dark.css?v=20260330b"/>

  <style id="GLOBAL_THEME_V2">
    :root{--bg:#04070f;--bg2:#0a0f1d;--card:#0f172a;--card2:#111b31;--line:#26344f;--text:#e7efff;--sub:#9bb0d9}
    html,body{background:#04070f!important}
    body{
      background:
        radial-gradient(900px 520px at 85% -15%, rgba(56,104,210,.22), transparent 60%),
        radial-gradient(780px 460px at -10% 110%, rgba(24,144,255,.14), transparent 62%),
        linear-gradient(180deg,var(--bg),var(--bg2)) !important;
      color:var(--text)!important;
      min-height:100vh;
    }
    .container{max-width:1200px}
    h1,h2,h3,h4,h5,h6,li,th,td,label,span,div,p{color:inherit}
    .sub,.muted{color:var(--sub)!important}
    .card,.panel,.topbar,.pick,section{background:linear-gradient(180deg,var(--card2),var(--card))!important;border:1px solid var(--line)!important;box-shadow:0 10px 28px rgba(0,0,0,.28)!important}
    a{color:#9ec4ff}
    .btn{background:#2563eb!important;color:#fff!important;border:1px solid #2f6fff!important}
    .btn.secondary{background:#243247!important;border:1px solid #334866!important}
    input,select,textarea{background:#0a1326!important;color:#e6eeff!important;border:1px solid #2a3d69!important}
    table th,table td{border-bottom:1px solid #243457}
  </style>

</head><body style="background:radial-gradient(1200px 700px at 85% -10%, rgba(90,114,255,.20), transparent 65%),radial-gradient(1000px 600px at 0% 100%, rgba(30,180,255,.14), transparent 60%),linear-gradient(180deg,#070b14,#0b1220)!important;color:#dbe7ff;">
<main class="container">
  <h1>📉 超跌反弹扫描</h1>
  <p class="sub">目标：识别已处于超跌区间且具备短线反弹概率的A股标的。</p>
  <section class="card">
    <h2>筛选逻辑（公开展示）</h2>
    <ul id="logic"></ul>
    <p id="status" class="sub">状态：待刷新</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button id="btnRefresh" type="button" class="btn">刷新扫描（真实计算）</button>
      <a class="btn secondary" href="/">返回目录</a>
    </div>
  </section>
  <section class="card">
    <h2>候选列表</h2>
    <table id="tbl"><thead><tr><th>代码</th><th>现价</th><th>60日回撤%</th><th>RSI14</th><th>偏离MA20%</th><th>当日反弹%</th><th>成交额(亿)</th><th>评分</th><th>说明</th></tr></thead><tbody></tbody></table>
  </section>
</main>
<script>
function fmt(n){ if(n===null||n===undefined||Number.isNaN(Number(n))) return '--'; return Number(n).toFixed(2)}
function setStatus(t){ const el=document.getElementById('status'); if(el) el.innerText='状态：'+t; }
function render(d){
  const lg=document.getElementById('logic');
  const L=d.logic||{};
  const S=d.scan_info||{};
  lg.innerHTML=`<li><b>超跌定义：</b>${L.oversold||'-'}</li><li><b>反弹信号：</b>${L.rebound_signal||'-'}</li><li><b>评分规则：</b>${L.score||'-'}</li><li><b>扫描覆盖：</b>${S.scanned_stocks||0} 只（分片 ${S.ok_pages||0}/${S.total_pages||0}）</li><li><b>稳定性提示：</b>${S.note||'-'}</li>`;
  const tb=document.querySelector('#tbl tbody'); tb.innerHTML='';
  (d.items||[]).forEach(x=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${x.code} ${x.name}</td><td>${fmt(x.price)}</td><td>${fmt(x.dd60)}</td><td>${fmt(x.rsi14)}</td><td>${fmt(x.ma20_gap)}</td><td>${fmt(x.rebound_day)}</td><td>${fmt(x.amount)}</td><td>${fmt(x.score)}</td><td>${x.reason}</td>`;
    tb.appendChild(tr);
  });
  if(!(d.items||[]).length){tb.innerHTML='<tr><td colspan="9" style="text-align:center">当前无满足条件标的</td></tr>'}
}
async function refreshData(){
  const btn=document.getElementById('btnRefresh');
  const old=btn.innerText;
  btn.disabled=true; btn.innerText='刷新中...'; setStatus('刷新中');
  try{
    const res=await fetch('/api/oversold-rebound');
    const j=await res.json();
    if(!res.ok||!j.ok){
      setStatus('失败（'+(j.message||('HTTP '+res.status))+')');
      alert(j.message||'刷新失败');
      return;
    }
    render(j.data);
    setStatus('刷新成功');
  }catch(e){
    setStatus('失败（网络异常）');
    alert('刷新失败：网络异常');
  }finally{
    btn.disabled=false; btn.innerText=old;
  }
}
window.addEventListener('DOMContentLoaded', ()=>{
  const btn=document.getElementById('btnRefresh');
  if(btn) btn.addEventListener('click', refreshData);
  refreshData();
});
</script>
</body></html>
