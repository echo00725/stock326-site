<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>全球新闻雷达 Pro</title>
  <link rel="stylesheet" href="/static/style.css?v=20260330b"/>
  <link rel="stylesheet" href="/static/dark.css?v=20260330b"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/map/js/world.js"></script>
  <style>
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .layout{display:grid;grid-template-columns:46% 54%;gap:14px;margin-top:12px}
    .panel{border:1px solid #334155;border-radius:14px;background:#0b1220;padding:12px}
    #worldWrap{position:relative;display:flex;justify-content:center;align-items:center;padding:0}
    #worldWrap::before,#worldWrap::after{display:none}
    #worldMap{width:100%;height:min(72vh,720px);min-height:360px;border-radius:12px;overflow:hidden;background:linear-gradient(180deg,#0b1220 0%,#071224 100%);border:1px solid #223248;box-shadow:0 8px 30px rgba(2,6,23,.45);filter:contrast(1.08) saturate(1.04);}
    .zoom-tools{position:absolute;right:14px;top:14px;display:grid;gap:6px;z-index:4}
    .zbtn{width:32px;height:32px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;cursor:pointer}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    .chip,.sort{padding:6px 10px;border:1px solid #334155;border-radius:999px;background:#111827;color:#e2e8f0;cursor:pointer;font-size:12px}
    .chip.active,.sort.active{background:#1d4ed8;border-color:#1d4ed8}
    .country-select{width:100%;padding:8px;border-radius:10px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;margin-top:6px}
    .news-item{padding:10px 0;border-bottom:1px dashed #334155}
    .news-item:last-child{border-bottom:none}
    .news-item a{color:#93c5fd;text-decoration:none;font-weight:600}
    .meta{color:#94a3b8;font-size:12px;margin-top:4px}
    .badge{display:inline-block;padding:2px 8px;border:1px solid #334155;border-radius:999px;margin-right:6px;font-size:12px}
    @media (max-width: 1000px){
      .layout{grid-template-columns:1fr}
      #worldMap{height:min(56vh,480px);min-height:300px}
    }
    @media (max-width: 520px){
      #worldMap{height:min(50vh,420px);min-height:260px}
    }
  </style>

  <style id="GLOBAL_THEME_V2">
    :root{--bg:#04070f;--bg2:#0a0f1d;--card:#0f172a;--card2:#111b31;--line:#26344f;--text:#e7efff;--sub:#9bb0d9}
    html,body{background:#04070f!important}
    body{
      background:
        radial-gradient(900px 520px at 85% -15%, rgba(56,104,210,.22), transparent 60%),
        radial-gradient(780px 460px at -10% 110%, rgba(24,144,255,.14), transparent 62%),
        linear-gradient(180deg,var(--bg),var(--bg2)) !important;
      color:var(--text)!important;
      min-height:100vh;
    }
    .container{max-width:1200px}
    h1,h2,h3,h4,h5,h6,li,th,td,label,span,div,p{color:inherit}
    .sub,.muted{color:var(--sub)!important}
    .card,.panel,.topbar,.pick,section{background:linear-gradient(180deg,var(--card2),var(--card))!important;border:1px solid var(--line)!important;box-shadow:0 10px 28px rgba(0,0,0,.28)!important}
    a{color:#9ec4ff}
    .btn{background:#2563eb!important;color:#fff!important;border:1px solid #2f6fff!important}
    .btn.secondary{background:#243247!important;border:1px solid #334866!important}
    input,select,textarea{background:#0a1326!important;color:#e6eeff!important;border:1px solid #2a3d69!important}
    table th,table td{border-bottom:1px solid #243457}
  </style>

</head>
<body style="background:radial-gradient(1200px 700px at 85% -10%, rgba(90,114,255,.20), transparent 65%),radial-gradient(1000px 600px at 0% 100%, rgba(30,180,255,.14), transparent 60%),linear-gradient(180deg,#070b14,#0b1220)!important;color:#dbe7ff;">
<main class="container">
  <div class="top">
    <h1>🌍 全球新闻雷达 Pro</h1>
    <a class="btn secondary" href="/">← 返回功能目录</a>
  </div>
  <p class="sub">直接点击地图上国家区域即可加载该国家新闻（不需要点黄色点）。</p>

  <div class="layout">
    <section class="panel">
      <div id="worldWrap"><div id="worldMap"></div><div class="zoom-tools"><button class="zbtn" id="zoomIn">＋</button><button class="zbtn" id="zoomOut">－</button><button class="zbtn" id="zoomReset">⟲</button></div></div>
      <select id="countrySelect" class="country-select"></select>
      <div class="toolbar" id="quickRegions"></div>
    </section>

    <section class="panel">
      <h2 id="regionTitle">地区：-</h2>
      <div class="meta" id="updatedAt">更新时间：-</div>
      <div class="toolbar" id="sortBar">
        <button class="sort active" data-sort="heat">按热度</button>
        <button class="sort" data-sort="time">按时间</button>
        <button class="sort" data-sort="impact">按影响</button>
      </div>
      <div id="newsList"></div>
    </section>
  </div>
</main>

<script>
const countries = {
  china:{name:'中国',coord:[116.4,39.9]}, us:{name:'美国',coord:[-77.0,38.9]}, europe:{name:'欧洲',coord:[2.3,48.9]},
  japan:{name:'日本',coord:[139.7,35.6]}, middleeast:{name:'中东',coord:[46.7,24.7]}, india:{name:'印度',coord:[77.2,28.6]},
  russia:{name:'俄罗斯',coord:[37.6,55.7]}, brazil:{name:'巴西',coord:[-47.9,-15.8]}, canada:{name:'加拿大',coord:[-75.7,45.4]},
  australia:{name:'澳大利亚',coord:[149.1,-35.3]}, korea:{name:'韩国',coord:[126.9,37.6]}, singapore:{name:'新加坡',coord:[103.8,1.35]},
  uk:{name:'英国',coord:[-0.1,51.5]}, germany:{name:'德国',coord:[13.4,52.5]}, france:{name:'法国',coord:[2.35,48.86]},
  italy:{name:'意大利',coord:[12.49,41.89]}, spain:{name:'西班牙',coord:[-3.7,40.4]}, mexico:{name:'墨西哥',coord:[-99.1,19.4]},
  indonesia:{name:'印尼',coord:[106.8,-6.2]}, turkiye:{name:'土耳其',coord:[32.85,39.93]}, saudi:{name:'沙特',coord:[46.7,24.7]},
  uae:{name:'阿联酋',coord:[54.37,24.45]}
};

const aliasToKey = {
  'China':'china','United States':'us','United States of America':'us','Japan':'japan','India':'india','Russia':'russia',
  'Brazil':'brazil','Canada':'canada','Australia':'australia','South Korea':'korea','Singapore':'singapore','United Kingdom':'uk',
  'Germany':'germany','France':'france','Italy':'italy','Spain':'spain','Mexico':'mexico','Indonesia':'indonesia',
  'Turkey':'turkiye','Türkiye':'turkiye','Saudi Arabia':'saudi','United Arab Emirates':'uae',
  'Iran':'middleeast','Israel':'middleeast','Iraq':'middleeast','Syria':'middleeast','Qatar':'middleeast','Kuwait':'middleeast','Oman':'middleeast','Jordan':'middleeast','Egypt':'middleeast'
};

let currentRegion='china';
let currentSort='heat';
const mapEl = document.getElementById('worldMap');
let chart = null;
try { chart = echarts.init(mapEl); } catch (e) { console.error('echarts init failed', e); }

function showMapError(msg){
  mapEl.innerHTML = `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#94a3b8">${msg}</div>`;
}

async function ensureWorldMap(){
  if (echarts.getMap && echarts.getMap('world')) return true;
  // 优先本地静态文件，避免外网/CORS导致空白
  try{
    const local = await fetch('/static/maps/world.json', {cache:'no-store'});
    if (local.ok) {
      const geo = await local.json();
      echarts.registerMap('world', geo);
      return true;
    }
  }catch(e){}

  // 兜底CDN
  try{
    const res = await fetch('https://fastly.jsdelivr.net/npm/echarts/map/json/world.json');
    const geo = await res.json();
    echarts.registerMap('world', geo);
    return true;
  }catch(e){
    return false;
  }
}

function pulseData(region,count){
  const c = countries[region]?.coord || [116.4,39.9];
  const n = Math.max(5, Math.min(16, count));
  const pts=[];
  for(let i=0;i<n;i++) pts.push({value:[c[0]+(Math.random()-0.5)*5, c[1]+(Math.random()-0.5)*4, (count||1)]});
  return pts;
}

async function renderMap(region='china',count=10){
  if(!chart){ showMapError('地图组件初始化失败，请刷新重试'); return; }
  const ok = await ensureWorldMap();
  if(!ok){ showMapError('地图底图加载失败，请刷新重试'); return; }
  chart.clear();
  chart.setOption({
    backgroundColor:'transparent',
    geo:{
      map:'world', roam:true, zoom:1.06, layoutCenter:['50%','52%'], layoutSize:'96%',
      itemStyle:{areaColor:'#132a44',borderColor:'#5f8fcf',borderWidth:0.8},
      emphasis:{itemStyle:{areaColor:'#2563eb'}},
      label:{show:false}
    },
    visualMap:{show:false,min:0,max:100,inRange:{color:['#0ea5e9','#22d3ee','#f59e0b']}},
    series:[
      {
        type:'effectScatter', coordinateSystem:'geo', zlevel:2,
        symbolSize:(val)=> Math.max(8, Math.min(20, (val[2]||10))),
        rippleEffect:{brushType:'stroke',scale:3,period:4},
        itemStyle:{color:'#60a5fa',shadowBlur:18,shadowColor:'#60a5fa'},
        data:pulseData(region,count)
      }
    ]
  },true);

  chart.off('click');
  chart.on('click',(p)=>{
    if(!p || !p.name) return;
    const mapped = aliasToKey[p.name] || p.name.toLowerCase();
    selectRegion(mapped, p.name);
  });
}

function mountSelectors(){
  const select=document.getElementById('countrySelect');
  select.innerHTML=Object.entries(countries).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');
  if(countries[currentRegion]) select.value=currentRegion;
  select.onchange=()=>selectRegion(select.value);

  const quick=document.getElementById('quickRegions');
  const hot=['china','us','europe','japan','india','middleeast','uk','germany'];
  quick.innerHTML=hot.map(k=>`<button class="chip ${k===currentRegion?'active':''}" data-r="${k}">${countries[k].name}</button>`).join('');
  quick.onclick=(e)=>{ const b=e.target.closest('.chip'); if(!b) return; selectRegion(b.dataset.r); };
}

function setSort(sort){
  currentSort=sort;
  document.querySelectorAll('.sort').forEach(x=>x.classList.toggle('active',x.dataset.sort===sort));
  loadRegionNews(currentRegion);
}

function renderNews(data, displayName=''){
  document.getElementById('regionTitle').textContent=`地区：${displayName || data.region_name || currentRegion}`;
  document.getElementById('updatedAt').textContent=`更新时间：${data.updated_at || '-'}`;
  const items=data.items||[];
  document.getElementById('newsList').innerHTML=items.length?items.map(i=>`
    <div class="news-item">
      <a href="${i.link||'#'}" target="_blank" rel="noopener">${i.title_zh||i.title||'（无标题）'}</a>
      <div class="meta">
        <span class="badge">热度 ${i.heat||0}</span>
        <span class="badge">影响 ${i.impact||'中性'}</span>
        <span class="badge">时间 ${(i.published||'').replace('T',' ').slice(0,16) || '-'}</span>
        <span class="badge">来源 ${i.source_name || '-'}</span>
      </div>
      <div class="meta">${i.abstract||''}</div>
    </div>
  `).join(''):'<div class="meta">暂无该地区新闻。</div>';
  renderMap(currentRegion, items.length);
}

async function loadRegionNews(region, displayName=''){
  const res=await fetch(`/api/news/geo?region=${encodeURIComponent(region)}&limit=28&sort=${encodeURIComponent(currentSort)}`);
  const data=await res.json();
  renderNews(data, displayName);
}

function selectRegion(region, displayName=''){
  currentRegion=region;
  mountSelectors();
  loadRegionNews(region, displayName);
}

document.getElementById('sortBar').onclick=(e)=>{
  const b=e.target.closest('.sort'); if(!b) return; setSort(b.dataset.sort);
};

document.getElementById('zoomIn').onclick=()=>{ if(chart) chart.dispatchAction({type:'geoRoam',componentType:'geo',zoom:1.2}); };
document.getElementById('zoomOut').onclick=()=>{ if(chart) chart.dispatchAction({type:'geoRoam',componentType:'geo',zoom:0.84}); };
document.getElementById('zoomReset').onclick=()=>renderMap(currentRegion,10);
window.addEventListener('resize', ()=>{ try{ chart && chart.resize(); }catch(e){} });
window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ try{ chart && chart.resize(); }catch(e){} }, 180); });

mountSelectors();
renderMap(currentRegion,10);
loadRegionNews(currentRegion);
</script>
</body>
</html>
