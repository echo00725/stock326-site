<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A股成交量价位分布</title>
  <link rel="stylesheet" href="/static/style.css?v=20260330b" />
  <link rel="stylesheet" href="/static/dark.css?v=20260330b" />
  <style>
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .input { padding:8px 10px; border:1px solid #d1d5db; border-radius:8px; min-width:220px; }
    .muted { color:#6b7280; font-size:14px; }
    .chart-wrap { margin-top:12px; }
    .bar-line { display:grid; grid-template-columns: 70px 1fr 110px; gap:8px; align-items:center; margin:6px 0; }
    .bar-track { background:#eef2ff; border-radius:6px; height:18px; overflow:hidden; }
    .bar { background:#2563eb; height:100%; }
    .price { font-variant-numeric: tabular-nums; }
    .vol { text-align:right; font-variant-numeric: tabular-nums; }
  </style>

  <style id="GLOBAL_THEME_V2">
    :root{--bg:#04070f;--bg2:#0a0f1d;--card:#0f172a;--card2:#111b31;--line:#26344f;--text:#e7efff;--sub:#9bb0d9}
    html,body{background:#04070f!important}
    body{
      background:
        radial-gradient(900px 520px at 85% -15%, rgba(56,104,210,.22), transparent 60%),
        radial-gradient(780px 460px at -10% 110%, rgba(24,144,255,.14), transparent 62%),
        linear-gradient(180deg,var(--bg),var(--bg2)) !important;
      color:var(--text)!important;
      min-height:100vh;
    }
    .container{max-width:1200px}
    h1,h2,h3,h4,h5,h6,li,th,td,label,span,div,p{color:inherit}
    .sub,.muted{color:var(--sub)!important}
    .card,.panel,.topbar,.pick,section{background:linear-gradient(180deg,var(--card2),var(--card))!important;border:1px solid var(--line)!important;box-shadow:0 10px 28px rgba(0,0,0,.28)!important}
    a{color:#9ec4ff}
    .btn{background:#2563eb!important;color:#fff!important;border:1px solid #2f6fff!important}
    .btn.secondary{background:#243247!important;border:1px solid #334866!important}
    input,select,textarea{background:#0a1326!important;color:#e6eeff!important;border:1px solid #2a3d69!important}
    table th,table td{border-bottom:1px solid #243457}
  </style>

</head>
<body style="background:radial-gradient(1200px 700px at 85% -10%, rgba(90,114,255,.20), transparent 65%),radial-gradient(1000px 600px at 0% 100%, rgba(30,180,255,.14), transparent 60%),linear-gradient(180deg,#070b14,#0b1220)!important;color:#dbe7ff;">
  <main class="container">
    <h1>📊 A股成交量价位分布（步长0.01）</h1>
    <p class="sub">按最近N个交易日分钟数据聚合，支持成交量与成交额（步长0.01）</p>

    <section class="card">
      <div class="row">
        <input id="symbol" class="input" placeholder="输入6位代码，如 600519" value="600519" />
        <select id="days" class="input" style="min-width:140px">
          <option value="1">最近1个交易日</option>
          <option value="2">最近2个交易日</option>
          <option value="5">最近5个交易日</option>
          <option value="10">最近10个交易日</option>
          <option value="20">最近20个交易日</option>
          <option value="30">最近30个交易日</option>
          <option value="60">最近60个交易日</option>
          <option value="90">最近90个交易日</option>
        </select>
        <select id="interval" class="input" style="min-width:220px">
          <option value="5m">免费长周期（5分钟，建议60~120天）</option>
          <option value="1m">实时精细（1分钟，历史通常较短）</option>
        </select>
        <select id="metric" class="input" style="min-width:120px">
          <option value="volume">横轴: 成交量</option>
          <option value="amount">横轴: 成交额</option>
        </select>
        <button class="btn" onclick="loadData()">查询</button>
        <a class="btn secondary" href="/">返回首页</a>
      </div>
      <p id="meta" class="muted"></p>
      <p id="modeDiff" class="muted"></p>
      <p id="err" style="color:#b91c1c"></p>

      <div class="row" style="margin-top:8px;">
        <input id="priceFrom" class="input" style="min-width:140px" placeholder="起始价格，如 18.50" />
        <input id="priceTo" class="input" style="min-width:140px" placeholder="结束价格，如 22.00" />
        <button class="btn secondary" onclick="calcRangePct()">计算区间占比</button>
      </div>
      <p id="rangeResult" class="muted"></p>

      <div id="chart" class="chart-wrap"></div>

      <div id="hourlyBox" class="card" style="margin-top:12px; display:none;">
        <h3 style="margin:0 0 8px 0;">当日分时成交额（按小时）</h3>
        <p class="muted" id="hourlyMeta"></p>
        <div style="overflow:auto;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr>
                <th style="text-align:left;padding:6px;border-bottom:1px solid #e5e7eb;">小时段</th>
                <th style="text-align:right;padding:6px;border-bottom:1px solid #e5e7eb;">成交额</th>
                <th style="text-align:right;padding:6px;border-bottom:1px solid #e5e7eb;">占当日比例</th>
              </tr>
            </thead>
            <tbody id="hourlyTbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    let latestData = null;

    function fmtNum(n){ return Number(n||0).toLocaleString('zh-CN'); }

    function calcRangePct(){
      const result = document.getElementById('rangeResult');
      const metric = document.getElementById('metric').value;
      const fromVal = Number(document.getElementById('priceFrom').value);
      const toVal = Number(document.getElementById('priceTo').value);

      if(!latestData || !Array.isArray(latestData.profile) || latestData.profile.length===0){
        result.textContent = '请先查询数据后再计算区间占比。';
        return;
      }
      if(!Number.isFinite(fromVal) || !Number.isFinite(toVal)){
        result.textContent = '请输入有效的起止价格。';
        return;
      }

      const lo = Math.min(fromVal, toVal);
      const hi = Math.max(fromVal, toVal);
      const key = metric === 'amount' ? 'amount' : 'volume';
      const total = metric === 'amount' ? Number(latestData.total_amount||0) : Number(latestData.total_volume||0);

      if(total <= 0){
        result.textContent = '总量为0，无法计算占比。';
        return;
      }

      let part = 0;
      for(const r of latestData.profile){
        const p = Number(r.price||0);
        if(p >= lo && p <= hi){
          part += Number(r[key]||0);
        }
      }
      const pct = part / total * 100;
      result.textContent = `区间 ${lo.toFixed(2)} ~ ${hi.toFixed(2)} 在最近 ${latestData.range_days} 日内的${metric==='amount'?'成交额':'成交量'}占比：${pct.toFixed(2)}%（区间值 ${fmtNum(part)} / 总值 ${fmtNum(total)}）`;
    }

    function renderChart(profile, metric){
      const box = document.getElementById('chart');
      box.innerHTML = '';
      if(!profile || profile.length===0){
        box.innerHTML = '<p class="muted">暂无成交明细数据</p>';
        return;
      }
      const maxVal = Math.max(...profile.map(x=>Number(x[metric]||0)));
      const rows = [...profile].sort((a,b)=>b.price-a.price);
      rows.forEach(r=>{
        const line = document.createElement('div');
        line.className = 'bar-line';
        const val = Number(r[metric] || 0);
        const width = maxVal ? (val / maxVal * 100) : 0;
        line.innerHTML = `
          <div class="price">${r.price.toFixed(2)}</div>
          <div class="bar-track"><div class="bar" style="width:${width}%"></div></div>
          <div class="vol">${fmtNum(val)}</div>
        `;
        box.appendChild(line);
      });
    }

    function renderHourly(d){
      const box = document.getElementById('hourlyBox');
      const meta = document.getElementById('hourlyMeta');
      const tbody = document.getElementById('hourlyTbody');
      tbody.innerHTML = '';

      const rows = (d && Array.isArray(d.hourly_amount)) ? d.hourly_amount : [];
      if(!d || Number(d.range_days)!==1 || !rows.length){
        box.style.display = 'none';
        return;
      }

      rows.forEach(r=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align:left;padding:6px;border-bottom:1px solid #f1f5f9;">${r.hour}:00-${r.hour}:59</td>
          <td style="text-align:right;padding:6px;border-bottom:1px solid #f1f5f9;">${fmtNum(r.amount)}</td>
          <td style="text-align:right;padding:6px;border-bottom:1px solid #f1f5f9;">${Number(r.pct||0).toFixed(2)}%</td>
        `;
        tbody.appendChild(tr);
      });

      meta.textContent = `按小时统计当日成交额，并计算占当日总成交额比例（代码：${d.symbol}）`;
      box.style.display = 'block';
    }

    async function loadData(){
      const symbol = document.getElementById('symbol').value.trim();
      const days = document.getElementById('days').value;
      const interval = document.getElementById('interval').value;
      const metric = document.getElementById('metric').value;
      const err = document.getElementById('err');
      const meta = document.getElementById('meta');
      const modeDiff = document.getElementById('modeDiff');
      const chart = document.getElementById('chart');
      const rangeResult = document.getElementById('rangeResult');
      const hourlyBox = document.getElementById('hourlyBox');
      err.textContent = '';
      rangeResult.textContent = '';
      modeDiff.textContent = '';
      hourlyBox.style.display = 'none';
      meta.textContent = '加载中...';
      chart.innerHTML = '';
      if(!/^\d{6}$/.test(symbol)){
        err.textContent = '请输入6位A股代码';
        meta.textContent = '';
        return;
      }
      try{
        const res = await fetch(`/api/volume-profile?symbol=${symbol}&days=${days}&interval=${interval}`);
        const json = await res.json();
        if(!res.ok || !json.ok){
          throw new Error(json.error || '获取失败');
        }
        const d = json.data;
        latestData = d;
        const pocText = metric === 'amount'
          ? (d.poc_by_amount?.toFixed(2) ?? '-')
          : (d.poc_by_volume?.toFixed(2) ?? '-');
        meta.textContent = `代码: ${d.symbol} | 区间: ${d.start_date} ~ ${d.end_date} (${d.range_days}日) | 总成交量: ${fmtNum(d.total_volume)} 股 | 总成交额: ${fmtNum(d.total_amount)} | POC(${metric==='amount'?'额':'量'}): ${pocText} | 数据源: ${d.source} | 可用分钟天数: ${d.minute_days_available ?? '-'} | ${d.note || ''}`;
        modeDiff.textContent = '模式区别：5分钟=免费长周期（一般可到60~120天）；1分钟=更精细但历史通常较短，可能回退到日线。';
        renderChart(d.profile, metric);
        renderHourly(d);
      }catch(e){
        latestData = null;
        meta.textContent = '';
        err.textContent = e.message || '获取失败';
      }
    }

    document.getElementById('metric').addEventListener('change', ()=>{
      if(latestData){
        renderChart(latestData.profile, document.getElementById('metric').value);
        const fromInput = document.getElementById('priceFrom').value;
        const toInput = document.getElementById('priceTo').value;
        if(fromInput && toInput) calcRangePct();
      }
    });

    loadData();
  </script>
</body>
</html>
